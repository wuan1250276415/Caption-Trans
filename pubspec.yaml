name: caption_trans
description: "Video subtitle extraction and translation app using Whisper and LLM."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Whisper / Audio
  whisper_ggml_plus:
    path: whisper_ggml_plus
  ffmpeg_kit_flutter_new_min: ^3.1.0

  universal_io: ^2.3.1

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Utilities
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  http: ^1.2.1

  # Networking & Storage
  shared_preferences: ^2.3.0

  # UI
  cupertino_icons: ^1.0.8
  openai_dart: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
